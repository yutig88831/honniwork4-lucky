<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看看這週和哪組數字有緣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f5ebe0; /* 奶茶背景色 */
            color: #4e342e; /* 深咖啡色文字 */
        }

        :root {
            --wheel-size: 320px;
            --accent-color: #d6ccc2; /* 奶油色 */
            --primary-button: #a98467; /* 咖啡色 */
        }

        @media (min-width: 640px) {
            :root { --wheel-size: 480px; }
        }

        #wheel-container {
            width: var(--wheel-size);
            height: var(--wheel-size);
            position: relative;
            transition: transform 6s cubic-bezier(0.2, 0, 0.1, 1);
            border: 8px solid #edede9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 韓系簡約指針 */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 40px;
            background-color: #a98467;
            border-radius: 2px;
            z-index: 40;
        }

        .pointer::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #a98467;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #fff;
            border: 2px solid #d6ccc2;
            border-radius: 50%;
            z-index: 35;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .center-dot::inner {
            width: 10px;
            height: 10px;
            background: #a98467;
            border-radius: 50%;
        }

        /* 按鈕樣式 */
        .spin-btn {
            background-color: #a98467;
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(169, 132, 103, 0.3);
        }

        .spin-btn:hover {
            background-color: #8c6a51;
            transform: translateY(-2px);
        }

        .spin-btn:active {
            transform: translateY(0);
        }

        /* 結果顯示動畫 */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-10">
        <h1 class="text-xl font-light tracking-[0.3em] text-[#7f5539] mb-3">來測測看你本週代表數字</h1>
        <div class="w-16 h-0.5 bg-[#d6ccc2] mx-auto"></div>
    </div>

    <!-- 輪盤主體 -->
    <div class="relative mb-12">
        <div class="pointer"></div>
        <div id="wheel-container" class="rounded-full bg-white overflow-hidden">
            <canvas id="wheelCanvas"></canvas>
            <div class="center-dot">
                <div class="w-2 h-2 bg-[#a98467] rounded-full"></div>
            </div>
        </div>
    </div>

    <!-- 旋轉按鈕 -->
    <button id="spinBtn" class="spin-btn mb-12 uppercase">
        START
    </button>

    <!-- 結果顯示區 -->
    <div id="resultBox" class="hidden text-center fade-in">
        <div class="inline-block bg-white/50 backdrop-blur-sm px-8 py-6 rounded-3xl border border-[#d6ccc2] min-w-[280px]">
            <span id="resultCategory" class="text-xs tracking-[0.2em] text-[#a98467] font-medium uppercase mb-2 block">CATEGORY</span>
            <h2 id="resultNumber" class="text-6xl font-extralight text-[#7f5539] mb-4">--</h2>
            <p id="resultDesc" class="text-sm text-[#8c6a51] font-light leading-relaxed"></p>
        </div>
    </div>

    <script>
        // 簡化後的分類配色 (柔和奶茶色調)
        const categories = [
            { name: "天醫", color: "#e9edc9", desc: "聰明與財富的流動", numbers: ["13", "31", "68", "86", "49", "94", "27", "72"] },
            { name: "延年", color: "#dbe7e4", desc: "展現才幹與責任的高度", numbers: ["19", "91", "78", "87", "34", "43", "26", "62"] },
            { name: "生氣", color: "#f2e9e4", desc: "吸引貴人與樂觀的能量", numbers: ["14", "41", "67", "76", "39", "93", "28", "82"] },
            { name: "伏位", color: "#f5ebe0", desc: "安靜沉澱，等待合適的契機", numbers: ["11", "22", "33", "44", "66", "77", "88", "99"] },
            { name: "絕命", color: "#edede9", desc: "果斷勇敢的行動特質", numbers: ["12", "21", "69", "96", "48", "84", "37", "73"] },
            { name: "五鬼", color: "#e3d5ca", desc: "充滿變化的創意與靈感", numbers: ["18", "81", "79", "97", "36", "63", "24", "42"] },
            { name: "六煞", color: "#d5bdaf", desc: "細膩的情感與人際魅力", numbers: ["16", "61", "47", "74", "38", "83", "29", "92"] },
            { name: "禍害", color: "#e6beae", desc: "言語的影響力與表達能耐", numbers: ["17", "71", "89", "98", "46", "64", "23", "32"] }
        ];

        let allOptions = [];
        categories.forEach(cat => {
            cat.numbers.forEach(num => {
                allOptions.push({ num, cat: cat.name, color: cat.color, desc: cat.desc });
            });
        });

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('wheel-container');
        const spinBtn = document.getElementById('spinBtn');
        const resultBox = document.getElementById('resultBox');

        let isSpinning = false;
        let currentRotation = 0;

        function drawWheel() {
            const size = container.offsetWidth;
            canvas.width = size;
            canvas.height = size;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2;
            const sliceAngle = (2 * Math.PI) / allOptions.length;

            ctx.clearRect(0, 0, size, size);

            allOptions.forEach((option, i) => {
                const angle = i * sliceAngle;
                
                // 畫扇形
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                ctx.fillStyle = option.color;
                ctx.fill();
                
                // 極簡線條邊框
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 1;
                ctx.stroke();

                // 畫數字
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#7f5539"; 
                ctx.font = `300 ${size/45}px "Noto Sans TC"`;
                ctx.fillText(option.num, radius - 20, 5);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            resultBox.style.opacity = 0;
            
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalSpin = (360 * 10) + extraDegrees;
            currentRotation += totalSpin;
            
            container.style.transform = `rotate(-${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                calculateResult();
            }, 6000);
        }

        function calculateResult() {
            const rotationInside360 = currentRotation % 360;
            const sliceSize = 360 / allOptions.length;
            
            // 指針在正上方 (270度方向)
            let index = Math.floor(((rotationInside360 + 270) % 360) / sliceSize);
            
            const winner = allOptions[index];

            document.getElementById('resultNumber').innerText = winner.num;
            document.getElementById('resultCategory').innerText = winner.cat;
            document.getElementById('resultDesc').innerText = winner.desc;
            
            resultBox.classList.remove('hidden');
            resultBox.style.opacity = 1;
        }

        window.addEventListener('load', drawWheel);
        window.addEventListener('resize', drawWheel);
        spinBtn.addEventListener('click', spin);

    </script>
</body>
</html>
